<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VITAL</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:#1e1e1e;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

.exercise{
margin:10px 0;
}

input[type="number"]{
width:70px;
}

button{
padding:8px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
margin-top:5px;
}

</style>

</head>

<body>

<h1>🏋️ VITAL</h1>

<div class="card" id="calendar"></div>

<div class="card" id="workout"></div>

<div class="card" id="diet"></div>

<div class="card">

<h2>⏱ Timer Recupero</h2>

<p id="timer">Pronto</p>

</div>

<div class="card">

<h2>⚖️ Peso corporeo</h2>

<input type="number" id="bodyweight">
<button onclick="saveWeight()">Salva</button>

<p id="lastWeight"></p>

</div>

<div class="card">

<h2>📊 Progressione Carichi</h2>

<canvas id="progressChart"></canvas>

</div>

<script>

/* -------- ALLENAMENTI -------- */

const workouts = {

1:{
name:"Full Body A",
exercises:[
{name:"Chest Press inclinata",sets:"4x6-8 RIR2"},
{name:"Lat Machine neutra",sets:"4x8-10 RIR2"},
{name:"Leg Press",sets:"3x8-10 RIR2"},
{name:"Rematore macchina",sets:"3x8-10 RIR2"},
{name:"Alzate laterali",sets:"3x12-15 RIR1"},
{name:"Pallof Press",sets:"3x12"}
]
},

2:{
name:"Cardio Zona 2",
exercises:[
{name:"45-60 min camminata veloce",sets:"Zona 2"}
]
},

3:{
name:"Full Body B",
exercises:[
{name:"Lat Machine larga",sets:"4x6-8"},
{name:"Chest Press",sets:"3x8-10"},
{name:"Hack Squat",sets:"3x8"},
{name:"Hip Thrust",sets:"3x10"},
{name:"Reverse Pec Deck",sets:"3x15"},
{name:"Side Plank",sets:"3x40 sec"}
]
},

5:{
name:"Interval Training",
exercises:[
{name:"30 sec veloce + 90 sec lento x8",sets:"HIIT"}
]
},

6:{
name:"Full Body C",
exercises:[
{name:"Chest Press",sets:"3x10"},
{name:"Pulley basso",sets:"3x10"},
{name:"Leg Curl",sets:"3x12"},
{name:"Leg Extension",sets:"3x12"},
{name:"Shoulder Press",sets:"3x8-10"},
{name:"Bird Dog",sets:"3x10"}
]
}

}

/* -------- DIETA LISTE -------- */

const diet = {

1:[
"Colazione: yogurt greco + avena",
"Pranzo: riso + pollo + verdure",
"Snack: frutta secca",
"Cena: pesce + verdure"
],

2:[
"Colazione: uova + pane integrale",
"Pranzo: riso + tacchino",
"Snack: yogurt",
"Cena: salmone + verdure"
],

3:[
"Colazione: yogurt + frutta",
"Pranzo: pasta + pollo",
"Snack: frutta",
"Cena: carne magra + verdure"
],

4:["Dieta lista 4"],
5:["Dieta lista 5"],
6:["Dieta lista 6"],
7:["Dieta lista 7"]

}

/* -------- GIORNO AUTOMATICO -------- */

const day = new Date().getDay()

document.getElementById("calendar").innerHTML =
"<h2>📅 Giorno: "+["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][day]+"</h2>"

/* -------- ALLENAMENTO -------- */

let workoutHTML=""

if(workouts[day]){

workoutHTML+="<h2>"+workouts[day].name+"</h2>"

workouts[day].exercises.forEach((ex,i)=>{

const weightID="w_"+day+"_"+i
const savedWeight=localStorage.getItem(weightID)||""

workoutHTML+=`
<div class="exercise">

<input type="checkbox" onchange="startTimer(90)">

<b>${ex.name}</b> (${ex.sets})

<br>

Peso: 
<input type="number"
value="${savedWeight}"
onchange="saveExerciseWeight('${weightID}',this.value)"> kg

</div>
`

})

}else{

workoutHTML="<h2>Riposo</h2>"

}

document.getElementById("workout").innerHTML=workoutHTML

/* -------- DIETA -------- */

let dietHTML="<h2>🥗 Dieta</h2>"

diet[day].forEach(d=>{
dietHTML+="<p>"+d+"</p>"
})

document.getElementById("diet").innerHTML=dietHTML

/* -------- TIMER -------- */

function startTimer(sec){

let time=sec

const timer=document.getElementById("timer")

const interval=setInterval(()=>{

timer.innerText=time+" sec"

time--

if(time<0){

clearInterval(interval)

timer.innerText="Recupero finito"

}

},1000)

}

/* -------- SALVATAGGIO PESI -------- */

function saveExerciseWeight(id,value){

localStorage.setItem(id,value)

updateChart()

}

/* -------- TRACKER PESO -------- */

function saveWeight(){

const w=document.getElementById("bodyweight").value

localStorage.setItem("bodyweight",w)

document.getElementById("lastWeight").innerText="Ultimo peso: "+w+" kg"

}

const savedWeight=localStorage.getItem("bodyweight")

if(savedWeight){

document.getElementById("lastWeight").innerText="Ultimo peso: "+savedWeight+" kg"

}

/* -------- GRAFICO PROGRESSIONE -------- */

const ctx=document.getElementById("progressChart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:["1","2","3","4","5","6","7","8"],
datasets:[{
label:"Progressione",
data:[],
borderColor:"lime"
}]
}
})

function updateChart(){

const data=[]

for(let i=0;i<8;i++){

const w=localStorage.getItem("w_1_"+i)

if(w) data.push(w)

}

chart.data.datasets[0].data=data

chart.update()

}

updateChart()

/* -------- PWA OFFLINE -------- */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
