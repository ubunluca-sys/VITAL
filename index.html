<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VITAL</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:#222;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

.exercise{
margin-bottom:8px;
}

.meal{
background:#333;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>🏋️ VITAL</h1>

<div class="card" id="workout"></div>

<div class="card" id="diet"></div>

<script>

const workouts = {

1:{
name:"Full Body A",
ex:[
"Chest Press inclinata — 4×6-8 RIR2",
"Lat Machine presa neutra — 4×8-10 RIR2",
"Leg Press — 3×8-10 RIR2",
"Rematore macchina supportata — 3×8-10 RIR2",
"Alzate laterali manubri — 3×12-15 RIR1",
"Pallof Press ai cavi — 3×12 per lato"
]
},

2:{
name:"Cardio Zona 2",
ex:[
"45-60 min camminata veloce oppure cyclette"
]
},

3:{
name:"Full Body B",
ex:[
"Lat Machine presa larga — 4×6-8 RIR2",
"Chest Press orizzontale — 3×8-10 RIR2",
"Hack Squat — 3×8 RIR3",
"Hip Thrust — 3×10 RIR3",
"Reverse Pec Deck — 3×15 RIR1",
"Side Plank — 3×30-40 sec per lato"
]
},

5:{
name:"Interval Training",
ex:[
"5 min riscaldamento",
"30 sec veloce + 90 sec lento × 8",
"5 min defaticamento"
]
},

6:{
name:"Full Body C",
ex:[
"Chest Press orizzontale — 3×10 RIR2",
"Pulley basso — 3×10 RIR2",
"Leg Curl — 3×12 RIR1",
"Leg Extension — 3×12 RIR1",
"Shoulder Press Machine — 3×8-10 RIR2",
"Bird Dog — 3×10 per lato lento"
]
}

}

const diet = {

1:{
colazione:"60g pane tostato oppure 50g fette biscottate + 2 cucchiaini olio",
spuntino:"10g frutta secca",
pranzo:"Verdura + 70g carboidrati + 1 uovo + 150g albume + 3 cucchiaini olio",
merenda:"50g prosciutto crudo magro / cotto magro / bresaola",
cena:"Verdura + 70g carboidrati + 200g carne bianca + 2 cucchiaini olio"
},

2:{
colazione:"150g yogurt greco 0% + 50g cereali o fiocchi avena + 10g frutta secca",
spuntino:"10g frutta secca",
pranzo:"50g carboidrati + 200g piselli oppure 50g legumi secchi + 3 cucchiaini olio",
merenda:"20g parmigiano",
cena:"Verdura + 70g carboidrati + 200g carne rossa + 2 cucchiaini olio"
},

3:{
colazione:"60g pane tostato oppure 50g fette biscottate + 100g albume + 1 cucchiaino olio",
spuntino:"10g frutta secca",
pranzo:"Verdura + 70g carboidrati + 30g parmigiano + 3 cucchiaini olio",
merenda:"50g prosciutto crudo / cotto / bresaola",
cena:"Verdura + 70g carboidrati + 200g carne bianca + 2 cucchiaini olio"
},

4:{
colazione:"60g pane tostato + 50g prosciutto crudo / cotto / bresaola",
spuntino:"10g frutta secca",
pranzo:"50g carboidrati + 200g piselli oppure 50g legumi + 3 cucchiaini olio",
merenda:"150g yogurt greco 0%",
cena:"Verdura + 70g carboidrati + 1 uovo + 150g albume + 2 cucchiaini olio"
},

5:{
colazione:"60g pane tostato + 100g albume + 1 cucchiaino olio",
spuntino:"10g frutta secca",
pranzo:"Verdura + 70g carboidrati + 30g parmigiano + 3 cucchiaini olio",
merenda:"50g prosciutto crudo / cotto / bresaola",
cena:"Verdura + 70g carboidrati + 200g carne bianca + 2 cucchiaini olio"
},

6:{
colazione:"60g pane tostato + 2 cucchiaini olio",
spuntino:"10g frutta secca",
pranzo:"Verdura + 70g carboidrati + 1 uovo + 150g albume + 3 cucchiaini olio",
merenda:"150g yogurt greco + 10g frutta secca",
cena:"Verdura + 70g carboidrati + 200g carne bianca + 2 cucchiaini olio"
},

0:{
colazione:"50g pane tostato + 100g albume + 1 cucchiaino olio",
spuntino:"10g frutta secca",
pranzo:"Verdura + 50g carboidrati + 200g carne bianca + 2 cucchiaini olio",
merenda:"10g frutta secca",
cena:"PASTO LIBERO"
}

}

const today=new Date().getDay()

const workoutDiv=document.getElementById("workout")

if(workouts[today]){

let html="<h2>"+workouts[today].name+"</h2>"

workouts[today].ex.forEach(e=>{
html+="<div class='exercise'>"+e+"</div>"
})

workoutDiv.innerHTML=html

}else{

workoutDiv.innerHTML="<h2>Riposo</h2>"

}

const d=diet[today]

document.getElementById("diet").innerHTML=`

<h2>🥗 Dieta</h2>

<div class="meal"><b>Colazione</b><br>${d.colazione}</div>

<div class="meal"><b>Spuntino</b><br>${d.spuntino}</div>

<div class="meal"><b>Pranzo</b><br>${d.pranzo}</div>

<div class="meal"><b>Merenda</b><br>${d.merenda}</div>

<div class="meal"><b>Cena</b><br>${d.cena}</div>

`

</script>

</body>
</html>
