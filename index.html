<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VITAL</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:#222;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

.exercise{
margin-bottom:10px;
}

input{
padding:5px;
margin-top:5px;
}

button{
padding:8px;
margin-top:10px;
background:#4CAF50;
border:none;
border-radius:5px;
color:white;
}

</style>

</head>

<body>

<h1>🏋️ VITAL</h1>

<div class="card" id="workout"></div>

<div class="card" id="diet"></div>

<div class="card">
<h2>⏱ Timer recupero</h2>
<p id="timer">Pronto</p>
</div>

<div class="card">
<h2>⚖️ Peso corporeo</h2>
<input type="number" id="bw" placeholder="peso kg">
<button onclick="saveBodyWeight()">Salva</button>
</div>

<div class="card">
<h2>📊 Progressione</h2>
<canvas id="chart"></canvas>
</div>

<script>

const workouts = {

1:{
name:"Full Body A",
ex:[
{id:1,n:"Chest Press inclinata",s:"4x6-8"},
{id:2,n:"Lat Machine neutra",s:"4x8-10"},
{id:3,n:"Leg Press",s:"3x8-10"},
{id:4,n:"Rematore macchina",s:"3x8-10"},
{id:5,n:"Alzate laterali",s:"3x12-15"},
{id:6,n:"Pallof Press",s:"3x12"}
]
},

3:{
name:"Full Body B",
ex:[
{id:7,n:"Lat Machine larga",s:"4x6-8"},
{id:8,n:"Chest Press",s:"3x8-10"},
{id:9,n:"Hack Squat",s:"3x8"},
{id:10,n:"Hip Thrust",s:"3x10"},
{id:11,n:"Reverse Pec Deck",s:"3x15"},
{id:12,n:"Side Plank",s:"3x40 sec"}
]
},

6:{
name:"Full Body C",
ex:[
{id:13,n:"Chest Press",s:"3x10"},
{id:14,n:"Pulley basso",s:"3x10"},
{id:15,n:"Leg Curl",s:"3x12"},
{id:16,n:"Leg Extension",s:"3x12"},
{id:17,n:"Shoulder Press",s:"3x8-10"},
{id:18,n:"Bird Dog",s:"3x10"}
]
}

}

const diet = {

1:["pane tostato + olio","frutta secca","70g carbo + uovo + albume","prosciutto","carne bianca + carbo"],
2:["yogurt greco + cereali","frutta secca","50g carbo + piselli","parmigiano","carne rossa"],
3:["pane + albume","frutta secca","70g carbo + parmigiano","bresaola","carne bianca"],
4:["pane + prosciutto","frutta secca","legumi + carbo","yogurt","uovo + albume"],
5:["pane + albume","frutta secca","parmigiano + carbo","prosciutto","carne bianca"],
6:["pane + olio","frutta secca","uovo + albume + carbo","yogurt","carne bianca"],
0:["pane + albume","frutta secca","carne bianca","frutta secca","pasto libero"]

}

const today=new Date().getDay()

const wDiv=document.getElementById("workout")

if(workouts[today]){

let html="<h2>"+workouts[today].name+"</h2>"

workouts[today].ex.forEach(e=>{

let saved=localStorage.getItem("w"+e.id)||""

html+=`
<div class="exercise">

<input type="checkbox" onclick="timer()">

<b>${e.n}</b> ${e.s}

<br>

Peso <input type="number" value="${saved}" onchange="saveWeight(${e.id},this.value)">

</div>
`

})

wDiv.innerHTML=html

}else{

wDiv.innerHTML="<h2>Riposo</h2>"

}

const d=diet[today]

document.getElementById("diet").innerHTML=

"<h2>Dieta</h2>"+
"Colazione: "+d[0]+"<br>"+
"Spuntino: "+d[1]+"<br>"+
"Pranzo: "+d[2]+"<br>"+
"Merenda: "+d[3]+"<br>"+
"Cena: "+d[4]

function saveWeight(id,v){

localStorage.setItem("w"+id,v)

updateChart()

}

function timer(){

let t=90

const el=document.getElementById("timer")

const i=setInterval(()=>{

el.innerText=t+" sec"

t--

if(t<0){

clearInterval(i)

el.innerText="finito"

}

},1000)

}

function saveBodyWeight(){

let w=document.getElementById("bw").value

let data=JSON.parse(localStorage.getItem("bw"))||[]

data.push(w)

localStorage.setItem("bw",JSON.stringify(data))

alert("salvato")

}

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:["1","2","3","4","5","6","7","8"],
datasets:[{
label:"Carichi",
data:[],
borderColor:"lime"
}]
}
})

function updateChart(){

let arr=[]

for(let i=1;i<20;i++){

let v=localStorage.getItem("w"+i)

if(v) arr.push(v)

}

chart.data.datasets[0].data=arr

chart.update()

}

updateChart()

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
